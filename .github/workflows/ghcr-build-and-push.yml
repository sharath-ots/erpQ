name: Build and push images (GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: erpq

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: core
            image: erpq-core
            context: coreQ
            dockerfile: coreQ/Dockerfile
          - id: auth
            image: erpq-auth
            context: authQ
            dockerfile: authQ/Dockerfile
          - id: auth-web
            image: erpq-auth-web
            context: authQ/web
            dockerfile: authQ/web/Dockerfile
          - id: apigate
            image: erpq-apigate
            context: .
            dockerfile: apiGate/Dockerfile
          - id: comdash
            image: erpq-comdash
            context: .
            dockerfile: comDash/Dockerfile
          - id: erp-proxy
            image: erpq-erp-proxy
            context: nginx
            dockerfile: nginx/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APIGATE_URL=${{ vars.NEXT_PUBLIC_APIGATE_URL || 'http://localhost:18080' }}
            NEXT_PUBLIC_COMDASH_URL=${{ vars.NEXT_PUBLIC_COMDASH_URL || 'http://localhost:13001' }}
            NEXT_PUBLIC_AUTHQ_URL=${{ vars.NEXT_PUBLIC_AUTHQ_URL || 'http://localhost:14100' }}
            NEXT_PUBLIC_LOGIN_DEV_BYPASS=${{ vars.NEXT_PUBLIC_LOGIN_DEV_BYPASS || 'false' }}
            NEXT_PUBLIC_ERPNEXT_SITE_LABEL=${{ vars.NEXT_PUBLIC_ERPNEXT_SITE_LABEL || 'ERPNext' }}
            AUTH_WEB_ASSET_PREFIX=${{ vars.AUTH_WEB_ASSET_PREFIX || '' }}

