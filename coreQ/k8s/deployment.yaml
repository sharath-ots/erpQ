apiVersion: apps/v1
kind: Deployment
metadata:
  name: coreq
  labels:
    app.kubernetes.io/name: coreq
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: coreq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coreq
    spec:
      containers:
        - name: coreq
          image: cityq/coreq:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
