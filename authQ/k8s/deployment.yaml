apiVersion: apps/v1
kind: Deployment
metadata:
  name: authq
  labels:
    app.kubernetes.io/name: authq
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: authq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authq
    spec:
      containers:
        - name: authq
          image: cityq/authq:latest
          ports:
            - containerPort: 4100
          env:
            - name: PORT
              value: "4100"
          readinessProbe:
            httpGet:
              path: /health
              port: 4100
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4100
            initialDelaySeconds: 15
            periodSeconds: 20
