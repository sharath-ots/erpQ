## Production compose
## - Uses pre-built GHCR images (no local builds)
## - Loads environment from repo-root .env
##
## Required in .env (recommended):
##   GHCR_OWNER=sharath-ots
##   GHCR_PREFIX=erpq
##   APP_VERSION=0.1.1
##
## Optional (if you mirrored upstream images to GHCR):
##   RABBITMQ_IMAGE=ghcr.io/<owner>/<prefix>-rabbitmq:0.1.1
##   NGINX_PROXY_IMAGE=ghcr.io/<owner>/<prefix>-nginx-proxy:0.1.1
##
## Deploy:
##   docker compose -f docker-compose.production.yml --env-file .env up -d

services:
  nginx-proxy:
    profiles: ["proxy"]
    image: ${NGINX_PROXY_IMAGE:-nginxproxy/nginx-proxy:latest}
    container_name: erpq-nginx-proxy
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${NGINX_PROXY_HTTP_PORT:-8081}:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - proxy

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13-management-alpine}
    hostname: rabbitmq
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-erpq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-erpq_dev_change_me}
      VIRTUAL_HOST: ${VIRTUAL_HOST_MQ:-mq.local}
      VIRTUAL_PORT: "15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - default
      - proxy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  core:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-core:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "14000:4000"
    environment:
      PORT: "4000"
      HOST: "0.0.0.0"
      CITYQ_MODULE_ERP: ${CITYQ_MODULE_ERP:-1}
      CITYQ_MODULE_CRM: ${CITYQ_MODULE_CRM:-1}
      CITYQ_MQ_URL: ${CITYQ_MQ_URL:-amqp://cityq:erpq_dev_change_me@rabbitmq:5672}
      VIRTUAL_HOST: ${VIRTUAL_HOST_CORE:-core.local}
      VIRTUAL_PORT: "4000"
    networks:
      - default
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-auth:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "14100:4100"
    environment:
      PORT: "4100"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-erpq-dev-jwt-change-me}
      CITYQ_INTERNAL_KEY: ${CITYQ_INTERNAL_KEY:-cityq-dev-internal-change-me}
      AUTHQ_PUBLIC_BASE_URL: ${AUTHQ_PUBLIC_BASE_URL:-http://localhost:14100}
      AUTHQ_OAUTH_RETURN_URL_PREFIXES: ${AUTHQ_OAUTH_RETURN_URL_PREFIXES:-http://localhost:13000,http://localhost:3000,http://127.0.0.1:13000}
      AUTHQ_OAUTH_DEFAULT_RETURN_URL: ${AUTHQ_OAUTH_DEFAULT_RETURN_URL:-http://localhost:13000/}
      AUTHQ_OAUTH_DEFAULT_ALLOWED_DOC_TYPES: ${AUTHQ_OAUTH_DEFAULT_ALLOWED_DOC_TYPES:-*}
      AUTHQ_GOOGLE_CLIENT_ID: ${AUTHQ_GOOGLE_CLIENT_ID:-}
      AUTHQ_GOOGLE_CLIENT_SECRET: ${AUTHQ_GOOGLE_CLIENT_SECRET:-}
      AUTHQ_GOOGLE_REDIRECT_URI: ${AUTHQ_GOOGLE_REDIRECT_URI:-http://localhost:14100/oauth/google/callback}
      AUTHQ_ZOHO_CLIENT_ID: ${AUTHQ_ZOHO_CLIENT_ID:-}
      AUTHQ_ZOHO_CLIENT_SECRET: ${AUTHQ_ZOHO_CLIENT_SECRET:-}
      AUTHQ_ZOHO_REDIRECT_URI: ${AUTHQ_ZOHO_REDIRECT_URI:-http://localhost:14100/oauth/zoho/callback}
      AUTHQ_ZOHO_ACCOUNTS_HOST: ${AUTHQ_ZOHO_ACCOUNTS_HOST:-accounts.zoho.com}
      VIRTUAL_HOST: ${VIRTUAL_HOST_AUTH:-auth.local}
      VIRTUAL_PORT: "4100"
    networks:
      - default
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-web:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-auth-web:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3100:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - default
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  apigate:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-apigate:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "18080:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      JWT_SECRET: ${JWT_SECRET:-erpq-dev-jwt-change-me}
      CORE_BACKEND_URL: http://core:4000
      AUTHQ_URL: http://auth:4100
      CITYQ_INTERNAL_KEY: ${CITYQ_INTERNAL_KEY:-cityq-dev-internal-change-me}
      CITYQ_MQ_URL: ${CITYQ_MQ_URL:-amqp://cityq:erpq_dev_change_me@rabbitmq:5672}
      ERPNEXT_URL: ${ERPNEXT_URL:-}
      ERPNEXT_PUBLIC_URL: ${ERPNEXT_PUBLIC_URL:-}
      ERPNEXT_API_KEY: ${ERPNEXT_API_KEY:-}
      ERPNEXT_API_SECRET: ${ERPNEXT_API_SECRET:-}
      ERPNEXT_CRM_PATH: ${ERPNEXT_CRM_PATH:-/app/crm}
      CITYQ_PORTAL_HRQ: ${CITYQ_PORTAL_HRQ:-1}
      CITYQ_PORTAL_PURQ: ${CITYQ_PORTAL_PURQ:-1}
      ERPNEXT_IFRAME_QUERY: ${ERPNEXT_IFRAME_QUERY:-}
      ERP_ALLOW_DOCTYPE_DISCOVERY: ${ERP_ALLOW_DOCTYPE_DISCOVERY:-0}
      ERP_PARTNER_RATE_MAX: ${ERP_PARTNER_RATE_MAX:-600}
      PAYMENT_PARTNER_RATE_MAX: ${PAYMENT_PARTNER_RATE_MAX:-120}
      ERP_DEFAULT_DOCTYPES: ${ERP_DEFAULT_DOCTYPES:-Lead,Opportunity,Customer,Contact,DocType,Quotation}
      VIRTUAL_HOST: ${VIRTUAL_HOST_API:-api.local}
      VIRTUAL_PORT: "8080"
    depends_on:
      auth:
        condition: service_started
      core:
        condition: service_healthy
    networks:
      - default
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  comdash:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-comdash:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "13000:3000"
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      APIGATE_INTERNAL_URL: http://apigate:8080
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3100}
      VIRTUAL_HOST: ${VIRTUAL_HOST_DASHBOARD:-dashboard.local}
      VIRTUAL_PORT: "3000"
    networks:
      - default
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  erp-proxy:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_PREFIX:-erpq}-erp-proxy:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "13002:80"
    networks:
      - default

volumes:
  rabbitmq_data:

networks:
  # Default: create an internal network named "<project>_proxy" automatically.
  # If you want to attach to an existing external nginx-proxy network, use:
  #   docker compose -f docker-compose.production.yml -f docker-compose.production.external-proxy.yml --env-file .env up -d
  proxy: {}
