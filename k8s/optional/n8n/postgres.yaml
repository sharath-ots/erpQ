apiVersion: v1
kind: Service
metadata:
  name: n8n-postgres
  namespace: erpq
spec:
  selector:
    app.kubernetes.io/name: n8n-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n-postgres
  namespace: erpq
spec:
  serviceName: n8n-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-postgres
    spec:
      serviceAccountName: erpq-sa
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: pg
          env:
            - name: POSTGRES_DB
              value: n8n
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

