apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: erpq
spec:
  selector:
    app.kubernetes.io/name: core
  ports:
    - name: http
      port: 4000
      targetPort: 4000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: erpq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core
    spec:
      serviceAccountName: erpq-sa
      containers:
        - name: core
          image: ghcr.io/sharath-ots/erpq-core:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: erpq-app-config
            - secretRef:
                name: erpq-app-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6

