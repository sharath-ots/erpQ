apiVersion: v1
kind: Service
metadata:
  name: auth-web
  namespace: erpq
spec:
  selector:
    app.kubernetes.io/name: auth-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-web
  namespace: erpq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-web
    spec:
      serviceAccountName: erpq-sa
      containers:
        - name: auth-web
          image: ghcr.io/sharath-ots/erpq-auth-web:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

