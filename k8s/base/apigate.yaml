apiVersion: v1
kind: Service
metadata:
  name: apigate
  namespace: erpq
spec:
  selector:
    app.kubernetes.io/name: apigate
  ports:
    - name: http
      port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigate
  namespace: erpq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apigate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apigate
    spec:
      serviceAccountName: erpq-sa
      containers:
        - name: apigate
          image: ghcr.io/sharath-ots/erpq-apigate:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: erpq-app-config
            - secretRef:
                name: erpq-app-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6

