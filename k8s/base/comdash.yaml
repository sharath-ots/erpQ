apiVersion: v1
kind: Service
metadata:
  name: comdash
  namespace: erpq
spec:
  selector:
    app.kubernetes.io/name: comdash
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comdash
  namespace: erpq
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: comdash
  template:
    metadata:
      labels:
        app.kubernetes.io/name: comdash
    spec:
      serviceAccountName: erpq-sa
      containers:
        - name: comdash
          image: ghcr.io/sharath-ots/erpq-comdash:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: erpq-app-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

