apiVersion: v1
kind: Secret
metadata:
  name: erpq-app-secrets
  namespace: erpq
type: Opaque
stringData:
  # Replace via overlay or kubectl create secret ... --from-env-file
  JWT_SECRET: "REPLACE_ME"
  CITYQ_INTERNAL_KEY: "REPLACE_ME"

  ERPNEXT_API_KEY: "REPLACE_ME"
  ERPNEXT_API_SECRET: "REPLACE_ME"

  # OAuth client credentials
  AUTHQ_GOOGLE_CLIENT_ID: "REPLACE_ME"
  AUTHQ_GOOGLE_CLIENT_SECRET: "REPLACE_ME"
  AUTHQ_ZOHO_CLIENT_ID: "REPLACE_ME"
  AUTHQ_ZOHO_CLIENT_SECRET: "REPLACE_ME"

  # RabbitMQ credentials (used inside CITYQ_MQ_URL and/or apps)
  RABBITMQ_DEFAULT_USER: "erpq"
  RABBITMQ_DEFAULT_PASS: "REPLACE_ME"

