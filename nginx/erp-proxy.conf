server {
    listen 80;
    server_name _;

    # ── Strip headers that prevent iframe embedding ───────────────────────────
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;

    # ── Cookie rewriting ──────────────────────────────────────────────────────
    # Rewrite cookie domain so the browser stores the cookie under our proxy IP.
    # Same-site between :13000 and :13002 means SameSite=Lax cookies still work.
    proxy_cookie_domain ~(.+) $host;

    # Remove Secure flag (proxy is plain HTTP; Secure would cause browser to drop cookie).
    proxy_cookie_flags ~ nosecure;

    # ── Handle Location redirects from ERPNext ────────────────────────────────
    proxy_redirect ~*https?://[^/]+(/.*)$ http://$host:$server_port$1;

    # ── WebSocket support (Frappe socket.io / realtime) ───────────────────────
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $http_connection;

    # ── Upstream headers ──────────────────────────────────────────────────────
    proxy_set_header Host             cityqerp.ortusolis.in;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Accept-Encoding  "";

    # ── Timeouts ──────────────────────────────────────────────────────────────
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    location / {
        proxy_pass        https://cityqerp.ortusolis.in;
        proxy_ssl_server_name on;
        proxy_ssl_verify  off;
    }
}
